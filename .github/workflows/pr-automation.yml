name: PR Automation & Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  # CodeRabbit Pre-PR Review
  coderabbit-review:
    name: CodeRabbit Security & Quality Review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run CodeRabbit Review
        run: |
          # Install CodeRabbit if needed
          if ! command -v coderabbit &> /dev/null; then
            curl -fsSL https://install.coderabbit.ai | sh
          fi

          # Run review against main
          coderabbit --base main --json > coderabbit-report.json || true

          # Check for CRITICAL issues
          if grep -q '"severity":"CRITICAL"' coderabbit-report.json; then
            echo "❌ CRITICAL issues found by CodeRabbit"
            cat coderabbit-report.json | jq '.[] | select(.severity=="CRITICAL")'
            exit 1
          fi

          # Warn on HIGH issues
          if grep -q '"severity":"HIGH"' coderabbit-report.json; then
            echo "⚠️ WARNING: HIGH severity issues found"
            cat coderabbit-report.json | jq '.[] | select(.severity=="HIGH")'
          fi

      - name: Upload CodeRabbit Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coderabbit-report
          path: coderabbit-report.json

  # Lint Check
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --format json > eslint-report.json || true
        continue-on-error: true

      - name: Check lint results
        run: |
          if [ -s eslint-report.json ]; then
            ERROR_COUNT=$(jq '[.[] | select(.messages[].severity==2)] | length' eslint-report.json)
            if [ "$ERROR_COUNT" -gt 0 ]; then
              echo "❌ Lint errors found: $ERROR_COUNT"
              jq '.' eslint-report.json
              exit 1
            fi
          fi

  # Type Check
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

  # Unit Tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  # Build
  build:
    name: Build & Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Check bundle size
        run: |
          # Warn if bundle > 500KB
          BUNDLE_SIZE=$(du -sh dist/ | cut -f1)
          echo "Bundle size: $BUNDLE_SIZE"

  # Story Validation
  story-validation:
    name: Story & Documentation Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for story files
        run: |
          # If changes to docs/stories/, validate story format
          if git diff --name-only origin/main | grep -q "docs/stories/"; then
            echo "ℹ️ Story files modified"
            # Validate YAML structure
            for file in docs/stories/*.md; do
              if [ -f "$file" ]; then
                echo "Validating: $file"
                # Basic validation: check for required sections
                grep -q "^# Story" "$file" && echo "✅ Title found" || echo "⚠️ Missing title"
                grep -q "^## Acceptance Criteria" "$file" && echo "✅ AC found" || echo "⚠️ Missing AC"
              fi
            done
          fi

  # Quality Summary
  quality-summary:
    name: Quality Summary & Gate Decision
    needs: [coderabbit-review, lint, typecheck, test, build, story-validation]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Quality Gates
        run: |
          LINT_STATUS=${{ needs.lint.result }}
          TYPECHECK_STATUS=${{ needs.typecheck.result }}
          TEST_STATUS=${{ needs.test.result }}
          BUILD_STATUS=${{ needs.build.result }}
          CODERABBIT_STATUS=${{ needs.coderabbit-review.result }}

          echo "🎯 Quality Gate Summary"
          echo "========================"
          echo "CodeRabbit:  $CODERABBIT_STATUS"
          echo "Lint:        $LINT_STATUS"
          echo "TypeCheck:   $TYPECHECK_STATUS"
          echo "Tests:       $TEST_STATUS"
          echo "Build:       $BUILD_STATUS"
          echo ""

          # Determine gate status
          if [[ "$CODERABBIT_STATUS" == "failure" ]] || [[ "$LINT_STATUS" == "failure" ]] || [[ "$TYPECHECK_STATUS" == "failure" ]] || [[ "$TEST_STATUS" == "failure" ]] || [[ "$BUILD_STATUS" == "failure" ]]; then
            echo "❌ QUALITY GATE: FAIL"
            echo "Please fix issues before merging"
            exit 1
          fi

          echo "✅ QUALITY GATE: PASS"
          echo "Ready for merge"

  # Deploy to Staging (on main branch)
  deploy-staging:
    name: Deploy to Staging
    needs: [quality-summary]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.quality-summary.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          # Add deployment commands here (Vercel, Railway, etc.)
          echo "✅ Staging deployment complete"

# Branch protection rules (enforce via GitHub settings)
# Required status checks for main:
# - coderabbit-review
# - lint
# - typecheck
# - test
# - build
# - quality-summary
#
# Branch restrictions:
# - Require pull request reviews: 1
# - Dismiss stale pull request approvals
# - Require status checks to pass before merging
# - Require branches to be up to date before merging
# - Include administrators in restrictions
